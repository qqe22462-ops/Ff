<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise For You! ✨</title>
    <style>
        /* พื้นหลังแบบน่ารักไล่เฉดสี */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ตู้คอนเทนเนอร์แบบใสๆ */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        /* ดีไซน์ปุ่มสวยๆ */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #45a049;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* ฟองอากาศตกแต่ง */
        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            opacity: 0.5;
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0); }
            50% { transform: translateX(100px); }
            100% { bottom: 1080px; transform: translateX(-100px); }
        }

        /* ข้อความแจ้งเตือน */
        #toast {
            visibility: hidden;
            background-color: #fff;
            color: #333;
            text-align: center;
            border-radius: 20px;
            padding: 10px 20px;
            position: fixed;
            bottom: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        #toast.show {
            visibility: visible;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bubble" style="width: 40px; height: 40px; left: 10%; animation-duration: 8s;"></div>
    <div class="bubble" style="width: 80px; height: 80px; left: 20%; animation-duration: 12s;"></div>
    <div class="bubble" style="width: 30px; height: 30px; left: 70%; animation-duration: 15s;"></div>
    <div class="bubble" style="width: 60px; height: 60px; left: 80%; animation-duration: 10s;"></div>

    <div class="glass-card">
        <h1>✨ Copy Your Script ✨</h1>
        <div class="btn-container">
            <button class="btn" onclick="copyMe('PC')">💻 คัดลอกสำหรับ PC</button>
            <button class="btn" style="background: #23a6d5;" onclick="copyMe('Mobile')">📱 คัดลอกสำหรับมือถือ</button>
        </div>
    </div>

    <div id="toast">คัดลอกสำเร็จแล้วจ้า! 💖</div>

    <script>
        const myScript = `loadstring(game:HttpGet("https://encrypt-x.pages.dev/Scripts?Id=0707572550892"))("0707572550892")`;

        function copyMe(type) {
            navigator.clipboard.writeText(myScript).then(() => {
                const toast = document.getElementById("toast");
                toast.innerText = "คัดลอก " + type + " สำเร็จ! ✨";
                toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 2500);
            });
        }
    </script>
</body>
</html>
